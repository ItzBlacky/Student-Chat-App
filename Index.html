<body>

<h1>Student Chat App</h1>
<div class="login-panel">

    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">

    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>

</div>
<div class="app-container">

    <!-- COURSES PANEL -->
    <div class="courses-panel">

        <h2>Courses</h2>

        <input type="text" id="courseInput" placeholder="Course name">
        <button id="addCourseBtn">Add</button>

        <ul id="courseList"></ul>

    </div>


    <!-- CHAT PANEL -->
    <div class="chat-panel">

        <h2 id="activeCourseTitle">Messages</h2>

        <ul id="messageList"></ul>

        <div class="message-input">

            <input type="text" id="messageInput" placeholder="Type message">
            <button id="sendMessageBtn">Send</button>

        </div>

    </div>


    <!-- NOTES PANEL -->
    <div class="notes-panel">

        <h2>Notes</h2>

        <input type="text" id="noteTitle" placeholder="Note title">
        <input type="file" id="noteFile">

        <button id="uploadNoteBtn">Upload</button>

        <ul id="notesList"></ul>

    </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/app.js"></script>

</body>
